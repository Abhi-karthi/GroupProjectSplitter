<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Project Splitter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

<div class="container" id="mainContainer">
    <h1>Project Splitter</h1>
    <p class="subtitle">Fairly distribute work in seconds.</p>

    <div id="loadingState" style="display: none; text-align: center; padding: 40px;">
        <div class="spinner"></div> <h2 style="margin-top: 20px;">Analyzing Project...</h2>
        <p>This usually takes 5-10 seconds.</p>
    </div>

    <div id="inputForm">
        <form id="projectForm">
            <div class="form-group">
                <label for="instructions">Assignment Instructions</label>
                <textarea id="instructions" placeholder="Paste your project requirements, rubric, or prompt here..." name="instructions"></textarea>
            </div>

            <div class="form-group">
                <label for="images">Attach Images (Optional)</label>
                <input type="file" id="images" name="images" accept="image/*" multiple style="margin-top: 8px;" onchange="handleFileSelect(event)">
                <div id="previewContainer" class="preview-container"></div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label for="deadline">Final Deadline</label>
                    <input type="date" id="deadline" name="date">
                </div>
                <div class="form-group">
                    <label for="people">Number of People</label>
                    <input type="number" id="people" min="1" max="10" value="3" name="number">
                </div>
            </div>

            <button type="submit">Split Project</button>
        </form>
    </div>

    <div id="resultsContainer" style="display: none;">
        <div id="resultsList"></div>
        <button style="background: var(--text-muted); margin-top: 24px;" onclick="resetForm()">Start Over</button>
    </div>

</div>

<script>
    let selectedFiles = [];

    document.getElementById('projectForm').addEventListener('submit', function(e) {
        // 1. Prevent default form submission to stop the page from refreshing
        e.preventDefault();

        // 2. Hide form and show loading spinner
        document.getElementById('inputForm').style.display = 'none';
        document.getElementById('loadingState').style.display = 'block';

        // 3. Package the data
        const formData = new FormData(this);

        // 4. Send asynchronous POST request
        fetch('/', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('loadingState').style.display = 'none';

            if (data.error) {
                alert("Error: " + data.error);
                document.getElementById('inputForm').style.display = 'block';
                return;
            }

            // 5. Build HTML dynamically from JSON response
            const resultsList = document.getElementById('resultsList');
            let htmlContent = '<div class="plan-grid" style="display: grid; gap: 1rem; margin-top: 1rem;">';

            data.plan.forEach(item => {
                htmlContent += `
                <div class="plan-card" style="padding: 1rem; border: 1px solid var(--border); border-radius: 8px; background: #f9fafb;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <strong>Student ${item.student}</strong>
                        <span class="badge" style="background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem;">
                            Diff: ${item.difficulty}/10
                        </span>
                    </div>
                    <p style="margin: 8px 0; color: var(--text-main);">${item.task}</p>
                    <div style="font-size: 0.85rem; color: var(--text-muted);">
                        📅 Internal Deadline: ${item.deadline}
                    </div>
                </div>`;
            });

            htmlContent += '</div>';
            resultsList.innerHTML = htmlContent;

            // Show the final container
            document.getElementById('resultsContainer').style.display = 'block';
        })
        .catch(error => {
            console.error('Error:', error);
            alert("Something went wrong processing your request.");
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('inputForm').style.display = 'block';
        });
    });

    function handleFileSelect(event) {
        const files = Array.from(event.target.files);
        selectedFiles = [...selectedFiles, ...files];
        updatePreviews();
        updateFileInput();
    }

    function removeFile(index) {
        selectedFiles.splice(index, 1);
        updatePreviews();
        updateFileInput();
    }

    function updatePreviews() {
        const container = document.getElementById('previewContainer');
        container.innerHTML = '';
        selectedFiles.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `
                    <img src="${e.target.result}">
                    <button type="button" class="delete-btn" onclick="removeFile(${index})">×</button>
                `;
                container.appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    }

    function updateFileInput() {
        const dataTransfer = new DataTransfer();
        selectedFiles.forEach(file => dataTransfer.items.add(file));
        document.getElementById('images').files = dataTransfer.files;
    }

    function resetForm() {
        document.getElementById('resultsContainer').style.display = 'none';
        document.getElementById('inputForm').style.display = 'block';
        document.getElementById('projectForm').reset();
        document.getElementById('previewContainer').innerHTML = '';
        selectedFiles = [];
    }
</script>
</body>
</html>
